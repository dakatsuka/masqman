version: "2"

run:
  timeout: 5m
  tests: true
  go: "1.26"
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - nilerr
    - nilnil
    - noctx
    - revive
    - sqlclosecheck
    - whitespace

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dakatsuka/masqman

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
