services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: app
      MYSQL_USER: masqman_proxy
      MYSQL_PASSWORD: masqman_proxy_password
    ports:
      - "127.0.0.1:33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./dev/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql-client:
    image: mysql:8.4
    profiles: ["client"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["mysql"]
    command:
      - "-hmysql"
      - "-umasqman_proxy"
      - "-pmasqman_proxy_password"
      - "app"

volumes:
  mysql_data:
