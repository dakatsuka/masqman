name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module metadata
        run: |
          go mod tidy -diff
          go mod verify

      - name: Check formatting
        run: |
          files="$(gofmt -l cmd internal)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Verify linter configuration
        run: go tool golangci-lint config verify

      - name: Run static analysis
        run: go tool golangci-lint run ./...
